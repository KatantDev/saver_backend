server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name saver.tg dev.saver.tg;

    # --- TLS (Cloudflare Origin Cert) ---
    ssl_certificate     /etc/ssl/cf-origin.crt;
    ssl_certificate_key /etc/ssl/private/cf-origin.key;

    # (Optional but recommended) Verify cloudflare-origin CA
    # ssl_client_certificate /etc/ssl/cf-origin-ca.pem;
    # ssl_verify_client off;

    # Reasonable TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Restore real client IP from Cloudflare
    # (Install ngx_http_realip_module if not built in)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Security headers (tune as needed)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; # enable after HTTPS is confirmed

    # --- App routes ---
    location /api/ {
        proxy_pass http://saver_backend-api:8000;

        # WebSocket & HTTP/1.1
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forwarded headers
        proxy_set_header Host $host;

        # With real_ip restored, $remote_addr is the client IP
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      https;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Port       443;

        # Timeouts (adjust to your app)
        proxy_connect_timeout   60s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # (Optional) buffering
        # proxy_buffering off;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
