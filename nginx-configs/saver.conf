server {
    listen 80;
    server_name saver.tg dev.saver.tg;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name saver.tg dev.saver.tg;

    ssl_certificate     /etc/nginx/conf.d/cf-origin.crt;
    ssl_certificate_key /etc/nginx/conf.d/cf-origin.key;
    ssl_client_certificate /etc/nginx/conf.d/cf-origin-ca.pem;
    ssl_verify_client off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://saver_backend-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
