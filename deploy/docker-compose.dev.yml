# Local-development overrides. ALL host port bindings are bound to 127.0.0.1
# rather than the default 0.0.0.0 so a developer laptop on a public Wi-Fi
# does not expose Postgres, Redis, the self-hosted Telegram Bot API server
# (which holds your TELEGRAM_API_ID/HASH), or bgutil to the local subnet.
services:
  api:
    ports:
    - "127.0.0.1:8000:8000"
    build:
      context: .
      # Bind-mounting the host repo over /app/src is incompatible with the
      # prod stage's non-root user — use the dev stage which keeps root
      # and includes pytest/mypy/ruff for CI's `target: dev` build path.
      target: dev
    volumes:
    - .:/app/src/
    environment:
      SAVER_BACKEND_RELOAD: "True"

  taskiq-worker:
    volumes:
      - .:/app/src/
    command:
      - scripts/start_taskiq_worker.sh
      - --with-reload

  taskiq-scheduler:
    volumes:
      - .:/app/src/
    command:
      - scripts/start_taskiq_scheduler.sh
      - --with-reload

  db:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  telegram-bot-api:
    ports:
      - "127.0.0.1:8081:8081"
      - "127.0.0.1:8082:8082"
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
      TELEGRAM_STAT: "1"
      TELEGRAM_VERBOSITY: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bgutil:
    ports:
      - "127.0.0.1:4416:4416"
