# .github/workflows/deploy.yml
name: Deploy saver_backend

on:
  workflow_run:
    workflows:
      - tests
    types:
      - completed
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}
    concurrency:
      group: deploy-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: false
    env:
      DEPLOY_PATH: /home/deploy/saver_backend
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Deploy over SSH (make deploy)
        uses: appleboy/ssh-action@v1
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          host: ${{ secrets.SSH_HOST }}     # из env dev/prod
          username: ${{ secrets.SSH_USER }} # из env dev/prod
          key: ${{ secrets.SSH_KEY }}       # из env dev/prod
          port: ${{ secrets.SSH_PORT }}     # (опц.) из env dev/prod
          envs: GH_APP_TOKEN,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail

            REPO="${{ github.repository }}"
            SHA="${{ github.event.workflow_run.head_sha }}"

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "⚙️ Initializing git repository..."
              git init "$DEPLOY_PATH"
              git -C "$DEPLOY_PATH" remote add origin "https://github.com/$REPO.git"
            fi

            echo "📥 Fetching commit $SHA..."
            git -C "$DEPLOY_PATH" \
              -c credential.helper='!f() { echo "username=x-access-token"; echo "password=${GH_APP_TOKEN}"; }; f' \
              fetch --depth=1 origin "$SHA"

            git -C "$DEPLOY_PATH" fetch --depth=1 origin "$SHA"
            git -C "$DEPLOY_PATH" reset --hard "$SHA"

            # Обновляем .env из секрета окружения
            echo "🔧 Updating environment configuration..."
            cat > "$DEPLOY_PATH/.env" <<'ENVFILE_END'
            ${{ secrets.ENV_FILE }}
            ENVFILE_END
            chmod 600 "$DEPLOY_PATH/.env"

            if ! command -v task >/dev/null 2>&1; then
              echo "⚙️ Installing go-task..."
              curl -1sLf 'https://dl.cloudsmith.io/public/task/task/setup.deb.sh' | sudo -E bash
              sudo apt-get update && sudo apt-get install -y task
            else
              echo "✅ go-task already installed"
            fi

            task -C "$DEPLOY_PATH" deploy
