# .github/workflows/deploy.yml
name: Deploy saver_backend

on:
  workflow_run:
    workflows:
      - tests
    types:
      - completed
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}
    concurrency:
      group: deploy-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: false
    env:
      DEPLOY_PATH: /home/deploy/saver_backend
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Deploy over SSH (make deploy)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          host: ${{ secrets.SSH_HOST }}     # из env dev/prod
          username: ${{ secrets.SSH_USER }} # из env dev/prod
          key: ${{ secrets.SSH_KEY }}       # из env dev/prod
          port: ${{ secrets.SSH_PORT }}     # (опц.) из env dev/prod
          envs: GH_APP_TOKEN,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail

            REPO="${{ github.repository }}"
            SHA="${{ github.event.workflow_run.head_sha }}"

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "⚙️ Initializing git repository..."
              git init "$DEPLOY_PATH"
            fi

            echo "📥 Fetching commit $SHA..."
            git -C "$DEPLOY_PATH" fetch --depth=1 "https://x-access-token:${GH_APP_TOKEN}@github.com/$REPO.git" "$SHA"
            git -C "$DEPLOY_PATH" reset --hard "$SHA"
            unset GH_APP_TOKEN

            cat > "$DEPLOY_PATH/.env" <<EOF
              ${{ secrets.ENV_FILE }}
            EOF
            chmod 600 "$DEPLOY_PATH/.env"

            if ! command -v task >/dev/null 2>&1; then
              echo "⚙️ Installing go-task..."
              sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
              source ~/.profile || true
            else
              echo "✅ go-task already installed"
              task --version
            fi

            task -d "$DEPLOY_PATH" deploy
