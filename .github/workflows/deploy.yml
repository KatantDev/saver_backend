# .github/workflows/deploy.yml
name: Deploy saver_backend

on:
  workflow_run:
    workflows:
      - tests
    types:
      - completed
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}
    concurrency:
      group: deploy-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: false
    env:
      DEPLOY_PATH: /home/deploy/saver_backend

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v5
        with:
            ref: ${{ github.event.workflow_run.head_sha }}
            fetch-depth: 1
            persist-credentials: false

      - name: Build release archive
        run: |
          set -euo pipefail
          umask 077

          git archive \
            --format=tar.gz \
            --output="$RUNNER_TEMP/release.tgz" \
            --prefix="saver_backend/" \
            HEAD

      - name: Prepare target directory (SSH)
        uses: appleboy/ssh-action@v1
        env:
           DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          fingerprint: ${{ secrets.SSH_HOST_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"

      - name: Upload release (SCP)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          fingerprint: ${{ secrets.SSH_HOST_KEY }}
          source: "release.tgz"
          target: "${{ env.DEPLOY_PATH }}"

      - name: Deploy on server (SSH)
        uses: appleboy/ssh-action@v1
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          fingerprint: ${{ secrets.SSH_HOST_KEY }}
          envs: ENV_FILE,DEPLOY_PATH
          script: |
            set -euo pipefail
            umask 077
            cd "$DEPLOY_PATH"

            tar -xzf release.tgz --overwrite
            rm -f release.tgz

            if [ -n "${ENV_FILE:-}" ]; then
              printf "%s" "$ENV_FILE" > .env
              chmod 600 .env
            fi

            if ! command -v make >/dev/null 2>&1; then
              echo "make не установлен на сервере" >&2
              exit 1
            fi

            make -C "$DEPLOY_PATH" deploy

      - name: Clean up workspace
        run: rm -f release.tgz
