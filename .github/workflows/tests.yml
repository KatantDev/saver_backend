name: tests

on: push

permissions:
  contents: read

jobs:
  lint:
    # Override the default matrix-derived job name (which would otherwise
    # include both `name` and `cmd` and produce display names like
    # `lint (Ruff format, ruff format --diff saver_backend tests)`).
    # Branch-protection required-status-check contexts must match the
    # display name verbatim, so we keep them short and stable.
    name: lint (${{ matrix.name }})
    strategy:
      matrix:
        include:
          - name: Ruff format
            cmd: ruff format --diff saver_backend tests
          - name: Ruff check
            cmd: ruff check saver_backend tests
          - name: Mypy
            cmd: mypy saver_backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
          # renovate: datasource=github-releases depName=python packageName=python/cpython versioning=pep440
          python-version: "3.14"
          enable-cache: "auto"

      - name: Install deps
        run: uv sync --locked --all-groups

      - name: ${{ matrix.name }}
        run: uv run ${{ matrix.cmd }}

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create .env
        run: touch .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build api image (cached)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          target: dev
          tags: saver_backend:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        env:
          SAVER_BACKEND_VERSION: ci
        run: docker compose run --rm api pytest -vv
